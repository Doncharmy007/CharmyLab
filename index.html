<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Finance Converter</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { background: #1e293b; padding: 30px; border-radius: 15px; max-width: 400px; margin: auto; border: 1px solid #38bdf8; }
        h1 { color: #38bdf8; font-size: 24px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; background: #0f172a; color: white; }
        button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; color: #4ade80; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Finance Converter</h1>
        <p>Convertissez vos Devises et Cryptos</p>
        <input type="number" id="amount" placeholder="Montant..." value="1">
        <select id="from">
            <option value="BTC">Bitcoin</option>
            <option value="USD">USD (Dollar)</option>
        </select>
        <button onclick="handleConversion()">Convertir Maintenant</button>
        <div id="result">---</div>
    </div>

    <script>
        function handleConversion() {
            // 1. OUVRE LA PUB (TON REVENU)
            // REMPLACE LE LIEN CI-DESSOUS PAR TON DIRECT LINK ADSTERRA
            window.open("https://www.profitablecpmratenetwork.com/np2bs9um?key=0b396d2dc651dc53117a1bbea5cbba1b", "_blank");

            // 2. FAIT LE CALCUL
            let amount = document.getElementById('amount').value;
            let from = document.getElementById('from').value;
            let rate = (from === "BTC") ? 65000 : 1; 
            let total = amount * rate;
            document.getElementById('result').innerText = total.toLocaleString() + " USDT";
        }
    </script>
</body>
</html>
